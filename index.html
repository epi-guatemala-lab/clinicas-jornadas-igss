<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/logo_igss.png" />
    <title>Clínicas de Empresa & SIPRESALUD — IGSS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <!-- Anti-flash: aplica .dark ANTES de React render según localStorage o default 'dark' -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('igss_theme'); // 'light' | 'dark' | 'system' | null
          // Default 'dark' si no hay preferencia guardada (decisión institucional).
          // 'system' respeta prefers-color-scheme; 'light' / 'dark' son explícitos.
          var sysDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var isDark =
            stored === 'dark' ||
            (stored === 'system' && sysDark) ||
            (!stored);  // sin preferencia → dark
          if (isDark) document.documentElement.classList.add('dark');
        } catch (_) {
          // En caso de error, default a dark
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body class="bg-canvas text-fg antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
